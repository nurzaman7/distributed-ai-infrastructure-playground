apiVersion: apps/v1
kind: Deployment
metadata:
  name: future-ai-systems-api
spec:
  replicas: 1
  selector:
    matchLabels:
      app: future-ai-systems-api
  template:
    metadata:
      labels:
        app: future-ai-systems-api
    spec:
      containers:
        - name: api
          image: python:3.11-slim
          workingDir: /app
          command: ["/bin/sh", "-c"]
          args:
            - pip install -r requirements.txt && uvicorn api.server:app --host 0.0.0.0 --port 8080
          ports:
            - containerPort: 8080
          livenessProbe:
            httpGet:
              path: /health
              port: 8080
            initialDelaySeconds: 20
            periodSeconds: 10
          readinessProbe:
            httpGet:
              path: /health
              port: 8080
            initialDelaySeconds: 10
            periodSeconds: 5
